[MessageLive]
ApiKey = your-api-key
EncryptionKey = your-encryption-key

[Relay]
Private = true
Radio = true
Selcal = true
Disconnect = true
Controllers = false

[Receive]
Enabled = true
Interval = 3
DeleteAfterProcess = false

[Commands]
Enabled = true
Title = command
Prefix = !

[Status]
Enabled = true
Interval = 60

[Queue]
Enabled = true
RetryInterval = 10
MaxAttempts = 5

[Log]
Enabled = true
Fingerprints = true
File = vPilot-MessageLive.log
FingerprintFile = vPilot-MessageLive.fingerprints.log
